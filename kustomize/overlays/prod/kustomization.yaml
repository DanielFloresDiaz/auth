apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml

namespace: solomon

labels:
- pairs:
    environment: prod
    tier: prod
  includeSelectors: true

configMapGenerator:
  - name: auth-generated-config
    behavior: merge
    literals:
      - GOTRUE_LOG_LEVEL=info
      - DB_NAME=postgres_auth
      - API_EXTERNAL_URL=https://solomonauth.com/
      - GOTRUE_SITE_URL=https://solomonauth.com/
      - GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI=https://solomonauth.com/callback
      - GOTRUE_URI_ALLOW_LIST=https://insidec.org/auth/callback


